<!DOCTYPE html>
<html>
<head>
    <title>Adicionar Transação</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div class="brand">
                <h1>Adicionar transação</h1>
                <div class="muted">Manual</div>
            </div>
            <div class="topbar-actions">
                <a class="btn btn-secondary" href="/transactions">Transações</a>
                <a class="btn btn-secondary" href="/">Voltar</a>
            </div>
        </div>

        <div class="card">
            <form method="POST" class="grid" style="grid-template-columns: repeat(2, minmax(0, 1fr));">
                <div class="field">
                    <label>Data</label>
                    <input type="date" name="date" required>
                </div>
                <div class="field">
                    <label>Tipo</label>
                    <select name="type" required>
                        <option value="receita">Receita</option>
                        <option value="despesa">Despesa</option>
                    </select>
                </div>

                <div class="field" style="grid-column: 1 / -1;">
                    <label>Descrição</label>
                    <input type="text" name="description" placeholder="Ex: Mercado">
                </div>

                <div class="field">
                    <label>Valor</label>
                    <input type="number" name="amount" placeholder="0,00" step="0.01" required>
                </div>
                <div class="field">
                    <label>Categoria</label>
                    <select name="category">
                        <option value="">Sem categoria</option>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field" style="grid-column: 1 / -1;">
                    <button class="btn" type="submit">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
