<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Finanças</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div class="brand">
                <h1>Gerenciador de Finanças</h1>
                <div class="muted">Dashboard</div>
            </div>
            <div class="topbar-actions">
                <a class="btn btn-secondary" href="/transactions">Transações</a>
                <a class="btn btn-secondary" href="/categories">Categorias</a>
                <a class="btn" href="/add_transaction">Adicionar transação</a>
                <a class="btn btn-secondary" href="/logout">Sair</a>
            </div>
        </div>

        <div class="card">
            <form id="filter-form" class="grid" onsubmit="return false;">
                <div class="field">
                    <label for="month">Mês</label>
                    <input type="number" id="month" placeholder="1-12" min="1" max="12">
                </div>
                <div class="field">
                    <label for="year">Ano</label>
                    <input type="number" id="year" placeholder="Ex: 2026" min="2000" max="2100">
                </div>
                <div class="field">
                    <label>&nbsp;</label>
                    <button class="btn" type="button" onclick="loadDashboard()">Filtrar</button>
                </div>
                <div class="field">
                    <label>&nbsp;</label>
                    <a class="btn btn-secondary" id="exportCsvLink" href="/export_csv">Baixar CSV</a>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="grid">
                <div class="field">
                    <label for="monthlyLimit">Limite mensal de gastos (despesas)</label>
                    <input type="number" id="monthlyLimit" placeholder="Ex: 1000" min="0" step="0.01">
                </div>
                <div class="field">
                    <label>&nbsp;</label>
                    <button class="btn" type="button" onclick="saveMonthlyLimit()">Salvar limite</button>
                </div>
                <div class="field">
                    <label for="category-name">Categorias personalizadas</label>
                    <div class="inline">
                        <input type="text" id="category-name" placeholder="Nova categoria">
                        <button class="btn btn-secondary" type="button" onclick="addCategory()">Adicionar</button>
                    </div>
                </div>
                <div class="field">
                    <label>Importar CSV</label>
                    <form method="POST" enctype="multipart/form-data" action="/import_csv" class="inline">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <input type="file" name="file" required>
                        <button class="btn btn-secondary" type="submit">Importar</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="alerta" class="alert" style="display:none;"></div>

        <div class="stats">
            <div class="stat">
                <div class="label">Receita</div>
                <div class="value" id="totalReceita"></div>
            </div>
            <div class="stat">
                <div class="label">Despesa</div>
                <div class="value" id="totalDespesa"></div>
            </div>
            <div class="stat">
                <div class="label">Saldo</div>
                <div class="value" id="totalMensal"></div>
            </div>
        </div>

        <div class="charts">
            <div class="card">
                <h2>Gastos por categoria</h2>
                <canvas id="gastosCategoria"></canvas>
            </div>
            <div class="card">
                <h2>Receita x Despesa</h2>
                <canvas id="receitaDespesa"></canvas>
            </div>
            <div class="card">
                <h2>Evolução mensal (saldo)</h2>
                <canvas id="evolucaoMensal"></canvas>
            </div>
        </div>
    </div>
    <script>loadDashboard();</script>
</body>
</html>
